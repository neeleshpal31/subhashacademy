services:
  - type: web
    name: my-college-website
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_SECURE_COOKIE
        value: "1"
      - key: SQLITE_DB_PATH
        value: /var/data/college.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
